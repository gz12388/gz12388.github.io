    .tree-container {
      max-width: 700px;
      margin: 40px auto 0 auto;
      background: var(--foreground);
      border-radius: var(--border-radius);
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      padding: 36px 24px 28px 24px;
      font-size: 1.08rem;
      color: var(--text);
    }
    .tree ul {
      list-style: none;
      margin: 0 0 0 18px;
      padding: 0 0 0 16px;
      border-left: none;
      position: relative;
    }
    .tree li {
      margin: 0;
      padding: 2px 0 2px 0;
      position: relative;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    .tree li::before {
      content: '';
      position: absolute;
      left: -16px;
      top: 0;
      width: 1px;
      height: 100%;
      border-left: 1.5px dashed #bbb;
      z-index: 0;
    }
    .tree li:last-child::before {
      height: 16px;
    }
    .tree ul > li:first-child::before {
      top: 12px;
    }
    .tree ul > li:only-child::before {
      display: none;
    }
    .tree li:hover {
      background: var(--icon-hover);
    }
    .tree .icon {
      width: 18px;
      display: inline-block;
      vertical-align: middle;
      margin-right: 4px;
      font-size: 1.1em;
    }
    .tree .toggle {
      width: 18px;
      display: inline-block;
      text-align: center;
      cursor: pointer;
      color: var(--primary);
      font-weight: bold;
      font-size: 1.1em;
      margin-right: 2px;
      user-select: none;
    }
    .tree .toggle.invisible {
      visibility: hidden;
    }
    .tree a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .tree a:hover {
      color: var(--button-hover);
      text-decoration: underline;
    }
    @media (max-width: 700px) {
      .tree-container { padding: 12px 2px 10px 2px; }
    }
    .nav-dropdown {
      position: relative;
      display: inline-block;
    }
    .nav-dropdown-menu {
      display: none;
      position: absolute;
      left: 0;
      top: 100%;
      min-width: 120px;
      background: var(--foreground);
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
      border-radius: var(--border-radius);
      z-index: 1001;

    .nav-dropdown-item {

      background: none;
      border: none;
      text-align: left;

    .nav-dropdown-item:hover {
      background: var(--icon-hover);
      color: var(--button-hover);
    }
    .nav-dropdown:hover .nav-dropdown-menu,
    .nav-dropdown:focus-within .nav-dropdown-menu {
      display: block;
    }

  <script>
document.addEventListener('DOMContentLoaded', function() {
  var dropdowns = document.querySelectorAll('.nav-dropdown');
  dropdowns.forEach(function(dropdown) {
    dropdown.addEventListener('mouseleave', function() {
      dropdown.querySelector('.nav-dropdown-menu').style.display = 'none';
    });
    dropdown.addEventListener('mouseenter', function() {
      dropdown.querySelector('.nav-dropdown-menu').style.display = 'block';
    });
    var toggle = dropdown.querySelector('.nav-dropdown-toggle');
    toggle.addEventListener('click', function(e) {
      e.preventDefault();
      var menu = dropdown.querySelector('.nav-dropdown-menu');
      menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
    });
    document.addEventListener('click', function(e) {
      if (!dropdown.contains(e.target)) {
        dropdown.querySelector('.nav-dropdown-menu').style.display = 'none';
      }
    });
  });
  (function() {
    var themeToggleBtn = document.getElementById('theme-toggle');
    if (!themeToggleBtn) return;
    function updateThemeIcon() {
      // 白天显示月亮，夜间显示太阳
      themeToggleBtn.textContent = document.body.classList.contains('night') ? '\u2600\ufe0f' : '\uD83C\uDF19';
    }
    updateThemeIcon();
    var oldOnClick = themeToggleBtn.onclick;
    themeToggleBtn.onclick = function(e) {
      if (oldOnClick) oldOnClick.call(this, e);
      // 切换主题
      document.body.classList.toggle('night');
      updateThemeIcon();
    };
    var observer = new MutationObserver(updateThemeIcon);
    observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
  })();
});
  </script>
