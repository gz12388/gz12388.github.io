    .tree-container {
      max-width: 700px;
      margin: 40px auto 0 auto;
      background: var(--foreground);
      border-radius: var(--border-radius);
      box-shadow: 0 4px 24px rgba(0,0,0,0.06);
      padding: 36px 24px 28px 24px;
      font-size: 1.08rem;
      color: var(--text);
    }
    .tree ul {
      list-style: none;
      margin: 0 0 0 18px;
      padding: 0 0 0 16px;
      border-left: none;
      position: relative;
    }
    .tree li {
      margin: 0;
      padding: 2px 0 2px 0;
      position: relative;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    .tree li::before {
      content: '';
      position: absolute;
      left: -16px;
      top: 0;
      width: 1px;
      height: 100%;
      border-left: 1.5px dashed #bbb;
      z-index: 0;
    }
    .tree li:last-child::before {
      height: 16px;
    }
    .tree ul > li:first-child::before {
      top: 12px;
    }
    .tree ul > li:only-child::before {
      display: none;
    }
    .tree li:hover {
      background: var(--icon-hover);
    }
    .tree .icon {
      width: 18px;
      display: inline-block;
      vertical-align: middle;
      margin-right: 4px;
      font-size: 1.1em;
    }
    .tree .toggle {
      width: 18px;
      display: inline-block;
      text-align: center;
      cursor: pointer;
      color: var(--primary);
      font-weight: bold;
      font-size: 1.1em;
      margin-right: 2px;
      user-select: none;
    }
    .tree .toggle.invisible {
      visibility: hidden;
    }
    .tree a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .tree a:hover {
      color: var(--button-hover);
      text-decoration: underline;
    }
    @media (max-width: 700px) {
      .tree-container { padding: 12px 2px 10px 2px; }

    .nav-dropdown {

    // 文件类型判断
    function getFileIcon(name) {
      // 前五项为主页、导航、确认书、关于、联系，均显示 web 图标
      if (["主页","导航","确认书","关于","联系"].includes(name)) return icons.web;
      const ext = name.split('.').pop().toLowerCase();
      if (["png","jpg","jpeg","gif","bmp","svg","webp"].includes(ext)) return icons.image;
      if (["html","md","js","css","json","ts","jsx","tsx"].includes(ext)) return icons.web;
      if (["zip","rar","7z","tar","gz"].includes(ext)) return icons.zip;
      if (["gpg","asc"].includes(ext)) return icons.gpg;
      return icons.file;
    }
    // 递归渲染树
    function renderTree(data, parent, level=0) {
      const ul = document.createElement('ul');
      data.forEach(item => {
        const li = document.createElement('li');
        // 文件夹
        if (item.type === 'folder') {
          const toggle = document.createElement('span');
          toggle.className = 'toggle';
          toggle.textContent = item.children && item.children.length ? '▸' : '';
          if (!item.children || !item.children.length) toggle.classList.add('invisible');
          li.appendChild(toggle);
          li.innerHTML += icons.folder + '<span>' + item.name + '</span>';
          if (item.children && item.children.length) {
            const childUl = renderTree(item.children, li, level+1);
            childUl.style.display = 'none';
            toggle.onclick = function(e) {
              e.stopPropagation();
              if (childUl.style.display === 'none') {
                childUl.style.display = 'block';
                toggle.textContent = '▾';
              } else {
                childUl.style.display = 'none';
                toggle.textContent = '▸';
              }
            };
            li.appendChild(childUl);
            li.onclick = function(e) { e.stopPropagation(); toggle.onclick(e); };
          }
        } else {
          // 文件
          li.innerHTML = getFileIcon(item.name) + `<a href="${item.link}" target="_blank">${item.name}</a>`;
        }
        ul.appendChild(li);
      });
      return ul;
    }
    document.getElementById('file-tree').appendChild(renderTree(treeData));

  <script>
document.addEventListener('DOMContentLoaded', function() {
  var dropdowns = document.querySelectorAll('.nav-dropdown');
  dropdowns.forEach(function(dropdown) {
    dropdown.addEventListener('mouseleave', function() {
      dropdown.querySelector('.nav-dropdown-menu').style.display = 'none';
    });
    dropdown.addEventListener('mouseenter', function() {
      dropdown.querySelector('.nav-dropdown-menu').style.display = 'block';
    });
    var toggle = dropdown.querySelector('.nav-dropdown-toggle');
    toggle.addEventListener('click', function(e) {
      e.preventDefault();
      var menu = dropdown.querySelector('.nav-dropdown-menu');
      menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
    });
    document.addEventListener('click', function(e) {
      if (!dropdown.contains(e.target)) {
        dropdown.querySelector('.nav-dropdown-menu').style.display = 'none';
      }
    });
  });
});
</script>
